version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running Pre Build"

  build:
    commands:
      - python app.py
      - pytest

  post_build:
    commands:
      - echo "Build Finished"

artifacts:
  files:
    - '**/*'